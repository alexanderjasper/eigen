summary: Edit embedded sources in eigen/cmd/ not .claude/ copies when modifying agent or skill files
reason: |
  Issue #37: spec-agent (and compile-agent) have been editing .claude/agents/ and
  .claude/skills/ files directly. These are scaffolded outputs — eigen scaffold writes
  them from the embedded sources in eigen/cmd/agents/ and eigen/cmd/skills/, which are
  compiled into the eigen binary. Editing .claude/ copies causes drift that gets
  silently overwritten the next time `eigen scaffold --force` is run. The source of
  truth is the embedded files in eigen/cmd/. Both spec-agent and compile-agent must
  edit those files and then re-scaffold to regenerate the .claude/ copies.
status: compiled
compiled_commits:
  - 922823c468686e7813303e4ad1de78fec00fc932
changes:
  behavior:
    - op: append
      text: |

        When a task involves modifying a skill or agent definition file (e.g. updating
        spec-agent.md, compile-agent.md, plan-agent.md, review-agent.md, or any
        eigen-change*.md skill), spec-agent edits the embedded source files in
        eigen/cmd/agents/ or eigen/cmd/skills/ — NOT the .claude/ copies. After editing
        the embedded source, it runs `cd eigen && go install ./...` to rebuild the binary,
        then runs `eigen scaffold --force --no-hooks` to regenerate the .claude/ copies
        from the updated embedded sources. Both the embedded source and the regenerated
        .claude/ copies are staged and committed together.
  acceptance_criteria:
    - id: AC-011
      description: |
        When spec-agent needs to modify a skill or agent definition file, it edits
        the embedded source under eigen/cmd/agents/ or eigen/cmd/skills/, not the
        .claude/agents/ or .claude/skills/ copy.
      given: spec-agent determines it needs to update a skill or agent definition file
      when: It makes the edit
      then: The edit targets eigen/cmd/agents/<name>.md or eigen/cmd/skills/<name>/SKILL.md, not the .claude/ copy
    - id: AC-012
      description: |
        After editing an embedded source file, spec-agent rebuilds the binary and
        regenerates the .claude/ copies via eigen scaffold.
      given: spec-agent has edited an embedded source file in eigen/cmd/
      when: It completes the edit
      then: |
        It runs `cd eigen && go install ./...` to rebuild the binary, then runs
        `eigen scaffold --force --no-hooks` to regenerate the .claude/ copies; both
        the embedded source and .claude/ copies are committed together
