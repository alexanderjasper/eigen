summary: Feedback-driven spec updates — spec remains authoritative across rejection loops
reason: |-
  When user provides feedback on rejected output, the spec should be updated (via spec-agent)
  before re-running failed phases. This keeps the spec as source of truth, enables fresh agents
  to plan/implement without conversation history, and ensures feedback is recorded permanently.
type: updated
changes:
  description: |-
    Refine the feedback loop: when user rejects output at any phase and provides feedback,
    the skill immediately invokes spec-agent to write a new change file incorporating the feedback,
    runs `eigen spec project` to update spec.yaml, commits the change, THEN re-runs the failed phase.
    This ensures the spec grows to capture all requirements and feedback — a fresh planning or
    compile agent could run from spec alone and produce the correct output without needing
    conversation context.
  acceptance_criteria:
    - id: AC-006
      description: |-
        On rejection at any phase: (1) collect user feedback via AskUserQuestion,
        (2) launch spec-agent with feedback to write changes/*.yaml update,
        (3) commit spec(...) change, (4) re-run the failed phase using updated spec.yaml
    - id: AC-007
      description: |-
        Plan-subagent writes plan.md as a persistent file artifact to .claude/plans/<branch>/plan.md
        (not just conversation output). Compile-subagent reads from this file.
    - id: AC-008
      description: |-
        Agents are defined as `.claude/agents/<name>.md` files with frontmatter name: field
        matching subagent_type invocations (spec-agent, plan-agent, compile-agent).
