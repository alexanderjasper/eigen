format: eigen/v1
id: ai-agent/skill-change
domain: ai-agent
module: skill-change
owner: alexander
title: Unified `change` skill — orchestrates spec → plan → compile workflow
description: |-
  Refine the feedback loop: when user rejects output at any phase and provides feedback,
  the skill immediately invokes spec-agent to write a new change file incorporating the feedback,
  runs `eigen spec project` to update spec.yaml, commits the change, THEN re-runs the failed phase.
  This ensures the spec grows to capture all requirements and feedback — a fresh planning or
  compile agent could run from spec alone and produce the correct output without needing
  conversation context.

  Companion standalone skills: eigen-change-spec (invokes spec-agent directly) and
  eigen-change-compile (invokes compile-agent directly) are available for manual phase
  invocation. eigen-plan has been removed; plan phase is owned by eigen-change.

  Spec commit ownership: spec-agent writes and validates change files but does NOT commit.
  eigen-change commits the spec files after the review UI approves them. On feedback
  rejection, eigen-change commits the feedback change file after the next spec-agent run
  completes.
behavior: |
  The /change skill orchestrates spec -> plan -> compile. At setup it fetches the
  latest main branch (`git fetch origin main`) and creates a new feature branch from it
  (`git checkout -b <feature-branch> origin/main`). The skill does NOT continue on the
  currently checked-out branch unless the user explicitly passes a flag (--branch) or
  explicitly instructs it to do so. The branch name is derived from the module path or
  feature description (e.g. `feat/skill-change-branch-from-main`). Setup also captures
  BRANCH (the new branch name) and WORKTREE (the worktree name, derived from the basename
  of `git rev-parse --show-toplevel`). WORKTREE is threaded into all HTTP API calls to the
  eigen serve API as a ?worktree= query parameter so modules are correctly disambiguated
  when the same module path exists in multiple worktrees.

  The approval polling loop checks the HTTP status code of each curl response before
  attempting JSON parsing. If the response is not HTTP 200, the loop logs a diagnostic
  message with the status code and response body. After a configurable number of
  consecutive failures (default 5), the loop exits with an error message instead of
  spinning forever. Python3 stderr is no longer suppressed (2>/dev/null is removed).

  Phase 4 review goes beyond static code analysis. The review-agent is instructed to
  start up as much of the local environment as possible before evaluating correctness.
  This includes: building the binary (`go build ./...` from the `eigen/` directory),
  starting the spec-navigator web server if the change involves the serve/navigator
  subsystem (`eigen serve &` and waiting for it to be ready), and then verifying
  behavior by exercising relevant API endpoints (curl) and web pages (fetch or browser
  tools if available). The review-agent reports which environment components it was
  able to start and which acceptance criteria were verified through live execution
  versus static analysis only.
acceptance_criteria:
  - id: AC-001
    description: |
      `change` skill can be invoked with feature description and optional short-name hint.
      At setup the skill fetches origin/main, creates a new feature branch from it, and
      calls spec-subagent with the description. The skill does NOT continue on the current
      branch unless the user passes --branch or explicitly instructs it to do so.
    given: A user invokes /change with a feature description
    when: The skill starts execution
    then: |
      The skill runs `git fetch origin main` then `git checkout -b <feature-branch> origin/main`,
      stores the new branch name as BRANCH, and launches spec-agent with the description.
  - id: AC-002
    description: |
      After spec-agent finishes writing change files and running `eigen spec project`,
      eigen-change posts the changes to the review API and starts a background poll
      (run_in_background: true, timeout: 300000ms) that exits with the full JSON result
      when the session status becomes "submitted". Claude is notified automatically when
      the poll completes and proceeds without blocking the conversation thread.
      On approval: eigen-change commits spec files, marks changes approved, proceeds to Phase 2.
      On rejection: eigen-change extracts change_comments from the result JSON, runs the
      Spec Feedback Loop, then re-posts to the review API for another round.
    given: spec-agent has written change files and run eigen spec project
    when: eigen-change posts them to the review API and polls for a decision
    then: On approval the spec is committed and changes marked approved; on rejection the Spec Feedback Loop runs
  - id: AC-003
    description: |
      Phase 2 — Plan — runs as follows:
      (1) eigen-change launches plan-agent (read-only subagent) with SPEC_PATH, MODULE_PATH,
          and BRANCH. plan-agent explores the codebase and returns a comprehensive draft plan
          as text output. plan-agent does NOT enter plan mode or write any files.
      (2) eigen-change (main conversation) calls EnterPlanMode, presenting the draft plan
          text to the user via the plan mode UI.
      (3) User reviews the plan in plan mode UI and either approves or comments/rejects.
      (4) eigen-change calls ExitPlanMode to collect approval status and the approved plan text.
      (5) On approval: eigen-change proceeds directly to Phase 3, passing the approved plan
          text inline to compile-agent. No plan.md file is written and no plan commit is made.
      (6) On rejection: eigen-change collects feedback via AskUserQuestion, runs the Spec
          Feedback Loop (spec-agent writes a new change file), then restarts Phase 2 from
          step (1).
    given: The spec phase has been approved
    when: eigen-change launches plan-agent with SPEC_PATH and MODULE_PATH
    then: plan-agent returns a draft plan as text; eigen-change presents it in plan mode UI for user approval
  - id: AC-004
    description: |
      After plan approval, compile-agent is called with the approved plan text passed as
      inline content (not a file path) alongside SPEC_PATH and MODULE_PATH.
      Compile-agent implements code and makes small atomic commits. After completion, user
      can review diff and approve final result.
    given: The plan has been approved by the user
    when: eigen-change launches compile-agent with the approved plan text inline
    then: compile-agent implements the code with atomic commits and reports completion
  - id: AC-005
    description: |
      Skill handles all Agent tool invocation, approval prompts, feedback loops, and branch
      creation/management. User only needs to invoke once with a description.
      Companion skills eigen-change-spec and eigen-change-compile are available for manual
      use; eigen-plan no longer exists.
    given: The /change skill is running
    when: Any agent phase needs to be invoked or approved
    then: eigen-change handles all Agent tool calls, approval prompts, feedback loops, and commits without requiring additional user commands
  - id: AC-006
    description: |
      On rejection at any phase: (1) extract feedback from review API result or AskUserQuestion,
      (2) launch spec-agent in feedback mode.
      If the feedback indicates a fundamental rewrite (wrong framing, wrong direction, start over):
        spec-agent deletes all draft change files (status="" or status="draft") and writes a fresh
        change file at the next available sequence number (001 if new module, higher if compiled
        changes exist).
      Otherwise: spec-agent writes a new change file at the next sequence number on top of existing ones.
      After spec-agent returns, eigen-change commits all pending spec files, then re-runs the failed phase.
    given: A user rejects any phase output with feedback
    when: The rejection is processed
    then: spec-agent runs in feedback mode, writes a new change file, eigen-change commits it, then the failed phase re-runs
  - id: AC-008
    description: |
      Agents are defined as `.claude/agents/<name>.md` files with frontmatter name: field
      matching subagent_type invocations (spec-agent, plan-agent, compile-agent).
    given: A subagent is needed for a phase of the workflow
    when: The agent is defined and deployed
    then: 'It exists as .claude/agents/<name>.md with a name: frontmatter field matching the subagent_type used to invoke it'
  - id: AC-009
    description: |
      Spec module naming convention: module paths use domain-based identifiers
      (e.g. `ai-agent`, `spec-cli/cmd-scaffold`), never sequence numbers.
      Only the YAML files inside `changes/` are numbered
      (e.g. `001_initial.yaml`, `002_add_feature.yaml`).
      A contributor creating a new spec module uses a human-readable path that
      reflects the domain, not an auto-incremented integer.
    given: A new spec module is created
    when: The module path is chosen
    then: The path uses a human-readable domain-based identifier (e.g. spec-cli/cmd-scaffold) rather than an integer
  - id: AC-010
    description: |
      Named-agent invocation pattern: every subagent used by the change skill is
      defined as a separate Markdown file in `.claude/agents/<name>.md` with a
      `name:` frontmatter field (e.g. `name: spec-agent`).
      The skill invokes each agent via `subagent_type: <name>` in the Agent tool
      call, where `<name>` matches the frontmatter field exactly.
      Using `subagent_type: general-purpose` with an inline system prompt is
      explicitly prohibited — inline prompts must be migrated to named agent files.
    given: A phase of the /change workflow needs a subagent
    when: The Agent tool is called
    then: The subagent_type field matches a named agent file; inline system prompts are not used
  - id: AC-011
    description: |
      plan-agent subagent is strictly read-only during Phase 2: it uses only Glob, Grep,
      Read, and Bash (read-only commands) to research the codebase. It does not call
      EnterPlanMode, ExitPlanMode, Write, Edit, or any git commands. Its sole output is
      a draft plan as text returned to eigen-change.
    given: plan-agent is invoked to research the codebase and produce a draft plan
    when: plan-agent runs
    then: It uses only read-only tools (Glob, Grep, Read, Bash for discovery); it does not write files or call plan mode tools
  - id: AC-012
    description: |
      EnterPlanMode and ExitPlanMode are called exclusively by eigen-change (the main
      conversation skill), never by any subagent. Any agent definition file
      (`.claude/agents/*.md`) must not instruct the agent to call EnterPlanMode or
      ExitPlanMode.
    given: Any subagent is running
    when: The workflow requires plan mode interaction
    then: Only eigen-change calls EnterPlanMode and ExitPlanMode; agent definition files never instruct agents to call them
  - id: AC-013
    description: |
      The compile-agent prompt instructs the agent to build with `go build ./...` from the
      `eigen/` subdirectory of the repo root. The `eigen` CLI is assumed to be installed in
      $PATH. If `eigen` is not found when running `eigen spec change-status`, the agent stops
      and asks the user to install it via `go install` from the `eigen/` directory.
    given: compile-agent is ready to mark changes compiled
    when: It runs eigen spec change-status
    then: It first verifies the eigen binary is in PATH; if not found it stops and asks the user to install it
  - id: AC-014
    description: |
      The Setup section captures WORKTREE by running
      `basename "$(git rev-parse --show-toplevel)"` and storing the result.
      WORKTREE is available to all subsequent phases alongside BRANCH.
    given: The /change skill starts execution
    when: The Setup section runs
    then: WORKTREE is captured from the basename of the git worktree root and stored for use in all phases
  - id: AC-015
    description: |
      All HTTP API calls to the eigen serve API (e.g. polling
      /api/modules/$MODULE/changes) include ?worktree=$WORKTREE as a query
      parameter. This prevents 409 Conflict responses when the module exists
      in both the main worktree and a feature worktree.
    given: The skill makes any curl request to the eigen serve API
    when: The URL is constructed
    then: The URL includes ?worktree=$WORKTREE as a query parameter
  - id: AC-016
    description: |
      The polling loop checks the HTTP status code returned by curl (using
      curl -s -w "%{http_code}" -o <tmpfile>) before attempting to parse the
      response body as JSON. If the status code is not 200, the body is not
      passed to python3 for parsing.
    given: The polling loop makes a curl request
    when: The HTTP response is received
    then: The status code is checked; non-200 responses are not parsed as JSON
  - id: AC-017
    description: |
      The python3 invocations in the polling loop do not suppress stderr
      (2>/dev/null is removed). Parse errors and exceptions are visible in
      the polling output.
    given: The polling loop runs python3 to parse JSON
    when: python3 encounters an error (malformed JSON, missing keys, etc.)
    then: The error message is visible in the polling output, not suppressed
  - id: AC-018
    description: |
      If the polling loop encounters 5 consecutive non-200 HTTP responses
      (or curl failures), it exits with a non-zero status and prints a
      diagnostic message including the last HTTP status code and response body.
      The loop does not spin forever on persistent errors.
    given: The eigen serve API is returning errors (409, 5xx, or unreachable)
    when: 5 consecutive polling attempts fail
    then: The loop exits with a diagnostic error message instead of spinning indefinitely
  - id: AC-019
    description: |
      At setup, if the user has passed a --branch <name> flag or has explicitly stated they
      want to continue on the current branch, the skill skips branch creation and uses the
      existing branch. Otherwise branch creation from origin/main is always performed.
    given: A user invokes /change without a --branch flag
    when: The Setup section runs
    then: |
      A new branch is created from origin/main; the current branch is not used.
      If --branch is passed or the user explicitly requests the current branch, branch
      creation is skipped and BRANCH is set to the existing branch name.
  - id: AC-020
    description: |
      Phase 4 review-agent builds the binary and starts any applicable local services
      before evaluating correctness. It does not rely solely on static source analysis.
      For changes involving the spec-navigator or serve subsystem, the agent starts
      `eigen serve` and waits for it to be ready before exercising API endpoints.
      The compliance report must state which ACs were verified through live execution
      vs. static analysis only.
    given: compile-agent has completed implementation and committed code
    when: review-agent runs in Phase 4
    then: |
      review-agent builds the binary (`go build ./...` from `eigen/`), optionally starts
      `eigen serve` for serve/navigator changes, exercises relevant curl endpoints and web
      pages, and produces a compliance report that distinguishes live-verified ACs from
      statically-verified ones.
dependencies: []
technology:
  AgentTypes: spec-subagent, plan-subagent, compile-subagent
  Invocation: /change "feature description" [--short-name "name"]
  OutputFormats: |-
    Specs: changes/*.yaml + spec.yaml (eigen-spec format)
    Plans: temporary plan mode UI only (no file written)
    Code: git commits
last_change: chg-011
changes_count: 11
