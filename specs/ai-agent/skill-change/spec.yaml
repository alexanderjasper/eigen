id: ai-agent/skill-change
domain: ai-agent
module: skill-change
owner: alexander
title: Unified `change` skill — orchestrates spec → plan → compile workflow
status: ""
description: |-
    Refine the feedback loop: when user rejects output at any phase and provides feedback,
    the skill immediately invokes spec-agent to write a new change file incorporating the feedback,
    runs `eigen spec project` to update spec.yaml, commits the change, THEN re-runs the failed phase.
    This ensures the spec grows to capture all requirements and feedback — a fresh planning or
    compile agent could run from spec alone and produce the correct output without needing
    conversation context.
behavior: ""
acceptance_criteria:
    - id: AC-009
      description: |-
        Spec module naming convention: module paths use domain-based identifiers
        (e.g. `ai-agent`, `spec-cli/cmd-scaffold`), never sequence numbers.
        Only the YAML files inside `changes/` are numbered
        (e.g. `001_initial.yaml`, `002_add_feature.yaml`).
        A contributor creating a new spec module uses a human-readable path that
        reflects the domain, not an auto-incremented integer.
      given: ""
      when: ""
      then: ""
    - id: AC-010
      description: |-
        Named-agent invocation pattern: every subagent used by the change skill is
        defined as a separate Markdown file in `.claude/agents/<name>.md` with a
        `name:` frontmatter field (e.g. `name: spec-agent`).
        The skill invokes each agent via `subagent_type: <name>` in the Agent tool
        call, where `<name>` matches the frontmatter field exactly.
        Using `subagent_type: general-purpose` with an inline system prompt is
        explicitly prohibited — inline prompts must be migrated to named agent files.
      given: ""
      when: ""
      then: ""
dependencies:
    - Agent tool (with subagent_type parameter)
    - spec-subagent definition
    - plan-subagent definition
    - compile-subagent definition
    - Integration with .claude/skills/ infrastructure
technology:
    AgentTypes: spec-subagent, plan-subagent, compile-subagent
    Invocation: /change "feature description" [--short-name "name"]
    OutputFormats: |-
        Specs: changes/*.yaml + spec.yaml (eigen-spec format)
        Plans: markdown file
        Code: git commits
last_change: ""
changes_count: 3
