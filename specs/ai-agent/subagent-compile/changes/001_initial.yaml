type: created
summary: compile-subagent — implements code changes following approved plan
reason: |-
  Implementation requires precise execution of the plan, testing against acceptance criteria, and
  careful atomic commits. A compile-subagent automates this, following the plan step-by-step,
  making changes, testing, and committing incrementally.
status: compiled
changes:
  title: compile-subagent — implements code changes following approved plan
  owner: alexander
  description: |-
    A subagent invoked by the `change` skill during the compile phase. It receives an approved plan
    (markdown file) and spec (spec.yaml). It follows the plan step-by-step: reads each step,
    makes the specified code changes using Edit/Write tools, tests changes locally if applicable,
    makes small atomic commits, and verifies that acceptance criteria from the spec are met.
    The subagent does exactly what the plan says, no more, no less. It makes decisions only for
    implementation details not covered by the plan. It commits frequently (after each logical step),
    uses conventional commit format, and reports completion status.
  technology:
    CommitPattern: 'feat/fix/refactor/docs/test(<area>): <summary>'
    Input: plan.md path, spec.yaml path
    Output: git commits on feature branch
    TestFramework: project-specific (go test, npm test, pytest, etc.)
    Tools: Glob, Grep, Read, Edit, Write, Bash, Git
  dependencies: []
  acceptance_criteria:
    - id: AC-001
      description: |-
        compile-subagent reads approved plan and spec, and executes the plan step-by-step.
        For each step: makes specified code changes, tests if applicable, commits with
        conventional message.
      given: ""
      when: ""
      then: ""
    - id: AC-002
      description: |-
        Makes small atomic commits after each logical step. Uses conventional commit format
        following the project's pattern (e.g., `feat(<area>): <summary>`, `fix:<summary>`, etc.).
      given: ""
      when: ""
      then: ""
    - id: AC-003
      description: |-
        Verifies that each implementation step produces the intended result. For changes that
        have tests, runs tests. For changes that affect UI, describes testing approach.
      given: ""
      when: ""
      then: ""
    - id: AC-004
      description: |-
        After completing all plan steps, verifies that spec acceptance criteria are satisfied.
        Reports any acceptance criteria that cannot be tested yet (e.g., require deployment).
      given: ""
      when: ""
      then: ""
    - id: AC-005
      description: |-
        Does not add features, refactor code, or make improvements beyond the plan. Follows
        "exactly what the plan says" principle. Only makes decisions for implementation details
        (e.g., variable names, helper functions) not covered by plan.
      given: ""
      when: ""
      then: ""
