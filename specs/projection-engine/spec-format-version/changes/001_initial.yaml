id: chg-001
sequence: 1
timestamp: "2026-03-30T07:19:12Z"
author: alexander
type: created
summary: Add format field to spec.yaml and change files for future migration support
reason: |
  Without a format version marker there is no way to detect that a spec file
  was written against an older schema, which risks silent misinterpretation as
  the format evolves. Establishing format: eigen/v1 as a first-class field now
  — before any breaking changes are made — gives migration tooling a reliable
  hook without breaking backward compatibility with existing specs that omit it.
status: compiled
changes:
  title: Spec Format Version
  owner: eigen
  status: draft
  description: |
    Adds a format field (e.g. format: eigen/v1) to SpecModule and to
    the initial change file template. The field is metadata-only: it is
    written as the first field in spec.yaml and in 001_initial.yaml
    scaffolded by eigen spec new, but it is not projected from changes
    and the CLI does not enforce or reject any particular version value yet.
  behavior: |
    eigen spec new writes format: eigen/v1 as the first field in the
    scaffolded 001_initial.yaml change file.

    eigen spec project writes format: eigen/v1 as the first field in the
    output spec.yaml, regardless of whether any change file sets it.

    eigen spec validate emits a warning (not an error) when format is absent
    from spec.yaml, preserving backward compatibility with existing specs.

    The projection engine ignores the format field when folding changes — it
    is never sourced from ChangeSet values.

    The CLI does not reject or block on any particular format version value.
  acceptance_criteria:
    - id: AC-001
      description: eigen spec new scaffolds format field in change template
      given: A new module path that does not yet exist
      when: eigen spec new <path> is run
      then: |
        The generated specs/<path>/changes/001_initial.yaml has
        format: eigen/v1 as the first field in the file
    - id: AC-002
      description: eigen spec project writes format field first in spec.yaml
      given: A module whose change files do not set a format field
      when: eigen spec project <path> is run
      then: |
        The written spec.yaml has format: eigen/v1 as the first field,
        before id, title, and all other fields
    - id: AC-003
      description: Projection ignores format field from change files
      given: A change file that sets format to an arbitrary string
      when: eigen spec project <path> is run
      then: |
        The format field in spec.yaml is always eigen/v1 regardless of
        what any change file contains for that field
    - id: AC-004
      description: eigen spec validate warns on missing format field
      given: A spec.yaml whose format field is absent
      when: eigen spec validate <path> is run
      then: |
        A warning is printed identifying the missing format field;
        the command still exits 0 and does not report a validation error
    - id: AC-005
      description: eigen spec validate passes silently when format is present
      given: 'A spec.yaml with format: eigen/v1'
      when: eigen spec validate <path> is run
      then: No warning or error is emitted for the format field
    - id: AC-006
      description: SpecModule struct exposes Format field
      given: The implementation is complete
      when: eigen/internal/spec/types.go is inspected
      then: |
        SpecModule has a Format string field tagged yaml:"format,omitempty"
        appearing before the id field in struct definition order
    - id: AC-007
      description: Tests cover format field behavior
      given: The implementation is complete
      when: go test ./eigen/internal/spec/... is run
      then: |
        Tests verify that Project() always returns Format == "eigen/v1",
        that Validate() returns a warning (not error) when Format is empty,
        and all tests pass
