id: chg-004
sequence: 4
timestamp: "2026-03-30T00:00:00Z"
type: updated
summary: Correct AC-010 to document two distinct YAML-writing strategies across spec_new.go and spec_change.go
reason: |
  The previous AC-010 described both spec_new.go and spec_change.go as using
  yaml.Marshal on a Change struct, but that is incorrect for spec_change.go.
  spec_new.go marshals a Change struct and therefore needs Change.Format set
  before the marshal call. spec_change.go uses buildChangeTemplate(), which
  returns a raw string — not a struct — so format must be prepended as the
  literal first line "format: eigen/v1\n" inside that function. When the
  --edit flag is used, the user-edited YAML is written back as raw bytes
  without re-marshaling, so the format line is naturally preserved from the
  template string. The AC must document both approaches so an implementer
  uses the correct strategy for each command.
status: compiled
changes:
  acceptance_criteria:
    - id: AC-010
      description: 'spec_new.go and spec_change.go use correct per-command strategies to write format: eigen/v1'
      given: The implementation is complete
      when: eigen/internal/spec/spec_new.go and eigen/internal/spec/spec_change.go are inspected
      then: |
        spec_new.go uses yaml.Marshal on a spec.Change struct. The Change
        value constructed before yaml.Marshal is called has Format set to
        "eigen/v1". Without this assignment yaml.Marshal will not emit the
        format key even if the struct carries the field.

        spec_change.go uses buildChangeTemplate(), which returns a raw string.
        The format line is written by prepending "format: eigen/v1\n" as the
        first line of the string inside buildChangeTemplate() — not by setting
        a struct field. When the --edit flag is used the user-edited YAML is
        written as raw bytes without re-marshaling, so the format line is
        preserved from the template string unchanged.
