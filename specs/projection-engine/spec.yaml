format: eigen/v1
id: projection-engine
domain: projection-engine
module: projection-engine
owner: eigen
title: Projection Engine
status: compiled
description: |
  The projection engine folds an ordered sequence of changes into a
  SpecModule projection. It is the change-sourcing core of Eigen — every
  spec.yaml is a deterministic result of replaying all changes in the
  module's changes/ directory.
behavior: |
  Changes are applied in ascending sequence order. Simple fields (title, owner,
  status, description, behavior, technology) use last-write-wins semantics.
  Acceptance criteria are merged by id: new ids are added, existing ids are
  updated in place, and criteria with removed: true are dropped from the
  projection. After each projection the spec.yaml metadata fields last_change
  and changes_count are updated automatically.

  ValidateChanges(current SpecModule, changes ChangeSet) compares each
  present field in changes against the current projection and returns a
  ValidationError for each field whose value is identical to the current
  state. For acceptance criteria, identity is checked per-criterion by id:
  an AC in changes is a no-op if an AC with the same id already exists in
  the projection with identical description, given, when, and then.

  Module lifecycle statuses: the status field on SpecModule accepts five
  values — draft, approved, compiled, deprecated, and removed.

  A change may set status: deprecated alongside a deprecation_reason field
  that explains what replaces the module. A change may set status: removed
  to hide the module from default views; the spec.yaml is preserved in the
  repository and remains fully accessible via git history.

  Validate() emits a ValidationWarning (non-blocking) for each dependency
  whose projected status is deprecated. It does not warn about removed
  dependencies — a module that depends on a removed module is an error
  handled by the existing broken-dependency check.

  The SpecModule struct gains a DeprecationReason field (YAML key:
  deprecation_reason) written to spec.yaml when status is deprecated.
  The ChangeSet struct gains a matching DeprecationReason field.

  Compiled status auto-promotion: after all changes have been folded, if
  every change in the module has a top-level Status of "compiled", the
  projected module status is automatically set to "compiled" — regardless
  of any ChangeSet.Status values set earlier in the change history. This
  promotion does not apply when the module's effective status is "deprecated"
  or "removed"; those terminal statuses take precedence.

  Inline polymorphic text ops: the ChangeSet fields Description and
  Behavior change from string to a new TextChange type. TextChange
  implements yaml.Unmarshaler and accepts two YAML forms:

  1. A YAML scalar (string) — interpreted as a full replacement of the
     field value. This is backward compatible with existing change files.
  2. A YAML sequence — interpreted as an ordered list of TextOp structs.
     Each TextOp has an Op field (one of "replace", "prepend", "append",
     "delete") and the relevant operands.

  TextChange has methods: IsSet() bool (true if the YAML key was present),
  IsFullReplace() bool (true when the value is a scalar string), FullText()
  string (returns the scalar value), and Ops() []TextOp (returns the ops
  list). When IsFullReplace() is true the engine uses the scalar value as a
  last-write-wins replacement (same as today). When Ops() is non-empty the
  engine applies each op sequentially against the current projected value.

  TextOp struct has fields: Op string (yaml "op"), Old string (yaml "old",
  used by replace), New string (yaml "new", used by replace), and Text
  string (yaml "text", used by prepend, append, and delete).

  Operations:
  - "replace": finds the first occurrence of Old in the current value and
    replaces it with New. If Old is not found, returns a projection error
    (not a silent no-op). First occurrence only.
  - "prepend": inserts Text before the current value (Text + current).
  - "append": inserts Text after the current value (current + Text).
  - "delete": finds the first occurrence of Text in the current value and
    removes it. If Text is not found, returns a projection error.

  Example YAML for a full replacement (backward compatible):
    changes:
      behavior: |
        Full text...

  Example YAML for op-based mutation:
    changes:
      behavior:
        - op: append
          text: |
            New paragraph...
        - op: replace
          old: "find this"
          new: "with this"

  ValidateChanges replays ops against the current projected value to
  compute the resulting text. If the result is identical to the current
  value, ValidateChanges returns a ValidationError for that field with a
  no-op message, just as it does for plain field no-ops. Note that
  replace/delete ops that fail to match are caught earlier as projection
  errors and never reach no-op validation.
acceptance_criteria:
  - id: AC-001
    description: Simple fields use last-write-wins across changes
    given: A module with two changes that both set the title field
    when: The projection engine runs
    then: The title in spec.yaml reflects the value from the later change
  - id: AC-002
    description: Acceptance criteria are merged by id
    given: Change 1 adds AC-001, change 2 adds AC-002 and updates AC-001
    when: The projection engine runs
    then: spec.yaml contains both AC-001 (updated) and AC-002
  - id: AC-003
    description: Removed acceptance criteria are excluded from the projection
    given: A change sets removed true on an existing criterion id
    when: The projection engine runs
    then: That criterion does not appear in spec.yaml
  - id: AC-004
    description: Changes are applied in sequence order regardless of file name sort
    given: Changes on disk with sequences 1, 3, 2
    when: The projection engine runs
    then: They are applied 1, 2, 3
  - id: AC-005
    description: Metadata is written after each projection
    given: A module with three changes
    when: The projection engine runs
    then: spec.yaml shows last_change as the id of change 3 and changes_count as 3
  - id: AC-006
    description: ValidateChanges flags a simple field equal to current state
    given: A projected SpecModule with title "Foo"
    when: ValidateChanges is called with a ChangeSet setting title to "Foo"
    then: Returns a ValidationError naming the title field as a no-op
  - id: AC-007
    description: ValidateChanges flags an AC identical to current state
    given: A projected SpecModule containing AC-001 with specific given/when/then
    when: ValidateChanges is called with a ChangeSet containing AC-001 with identical fields
    then: Returns a ValidationError naming AC-001 as a no-op
  - id: AC-008
    description: ValidateChanges allows an AC that differs in any field
    given: A projected SpecModule containing AC-001
    when: ValidateChanges is called with AC-001 where only the then field differs
    then: Returns no error for that AC
  - id: AC-009
    description: ValidateChanges allows a new AC id not present in current state
    given: A projected SpecModule with no AC-002
    when: ValidateChanges is called with a ChangeSet introducing AC-002
    then: Returns no error for AC-002
  - id: AC-010
    description: 'Projection: empty change list produces empty spec'
    given: An empty slice of changes and a module path
    when: Project() is called
    then: Returns a SpecModule with only id, domain, module set from the path, empty dependencies slice, empty technology map, and zero-value metadata
  - id: AC-011
    description: 'Projection: single initial change sets all fields'
    given: A single Change with all ChangeSet fields populated (title, owner, status, description, behavior, technology, dependencies, acceptance_criteria)
    when: Project() is called
    then: The returned SpecModule contains all field values from that change, LastChange equals the change ID, and ChangesCount is 1
  - id: AC-012
    description: 'Projection: last-write-wins for scalar fields'
    given: Two changes that both set title, owner, status, description, and behavior to different values
    when: Project() is called
    then: The returned SpecModule has the values from the second change for all scalar fields
  - id: AC-013
    description: 'Projection: acceptance criteria merged by id with add and update'
    given: Change 1 adds AC-A, Change 2 adds AC-B and updates AC-A with a new then field
    when: Project() is called
    then: The result contains both AC-A (with updated then) and AC-B, in insertion order
  - id: AC-014
    description: 'Projection: acceptance criteria with removed true are dropped'
    given: Change 1 adds AC-A, Change 2 sets AC-A with removed true
    when: Project() is called
    then: AC-A does not appear in the AcceptanceCriteria slice
  - id: AC-015
    description: 'Projection: dependencies are replaced wholesale, not merged'
    given: Change 1 sets dependencies to [A, B], Change 2 sets dependencies to [C]
    when: Project() is called
    then: The result has dependencies [C] only
  - id: AC-016
    description: 'Projection: technology keys are merged across changes'
    given: Change 1 sets technology {lang go}, Change 2 sets technology {db postgres}
    when: Project() is called
    then: The result has technology {lang go, db postgres}
  - id: AC-017
    description: 'Projection: metadata reflects the final change'
    given: Three changes with IDs chg-001, chg-002, chg-003
    when: Project() is called
    then: LastChange is chg-003 and ChangesCount is 3
  - id: AC-018
    description: 'Projection: sequence ordering is respected regardless of slice order'
    given: Changes provided in slice order [seq 3, seq 1, seq 2]
    when: Project() is called
    then: The result matches what you would get from applying them in order [seq 1, seq 2, seq 3]
  - id: AC-019
    description: 'Validation: missing required fields produce errors'
    given: A SpecModule with one or more of id, domain, module, owner, title, description, behavior empty
    when: Validate() is called
    then: A ValidationError is returned for each missing required field with the field name and a message indicating it is required
  - id: AC-020
    description: 'Validation: missing AC sub-fields produce errors'
    given: A SpecModule with an acceptance criterion missing given, when, or then
    when: Validate() is called
    then: A ValidationError is returned for each missing AC sub-field, formatted as acceptance_criteria[ID].field
  - id: AC-021
    description: 'Validation: broken dependency path produces error'
    given: A SpecModule with a dependency path that does not exist on disk
    when: Validate() is called with the specs root directory
    then: A ValidationError is returned naming the missing dependency
  - id: AC-022
    description: 'Validation: valid dependency path passes'
    given: A SpecModule with a dependency path that exists on disk (created via os.MkdirTemp)
    when: Validate() is called with the specs root directory
    then: No ValidationError is returned for dependencies
  - id: AC-023
    description: 'ValidateChanges: no-op simple field is flagged'
    given: A SpecModule with title set to X, and a ChangeSet also setting title to X
    when: ValidateChanges() is called
    then: Returns a ValidationError for the title field with a no-op message
  - id: AC-024
    description: 'ValidateChanges: AC with same id and identical content is flagged'
    given: A SpecModule with AC-001 having specific description/given/when/then, and a ChangeSet with AC-001 having identical fields
    when: ValidateChanges() is called
    then: Returns a ValidationError for acceptance_criteria[AC-001] with a no-op message
  - id: AC-025
    description: 'LintChangeFile: unquoted colon in scalar value is caught'
    given: 'A YAML byte slice containing a line like summary: foo: bar'
    when: LintChangeFile() is called
    then: Returns a LintError for that line mentioning bare colon
  - id: AC-026
    description: 'LintChangeFile: content inside block scalars is not linted'
    given: A YAML byte slice where a block scalar (using pipe or greater-than) contains lines with colons
    when: LintChangeFile() is called
    then: No LintError is returned for lines inside the block scalar
  - id: AC-027
    description: Test files exist at the correct paths
    given: The implementation is complete
    when: The test files are checked
    then: eigen/internal/spec/projection_test.go and eigen/internal/spec/validation_test.go exist, are in package spec, and all tests pass via go test
  - id: AC-028
    description: 'Module status: deprecated is a valid value'
    given: A change sets status to deprecated
    when: Project() is called
    then: The resulting SpecModule has Status "deprecated"
  - id: AC-029
    description: 'Module status: removed is a valid value'
    given: A change sets status to removed
    when: Project() is called
    then: The resulting SpecModule has Status "removed"
  - id: AC-030
    description: deprecation_reason is preserved in the projection
    given: A change sets status to deprecated and deprecation_reason to "Use module foo instead"
    when: Project() is called
    then: The resulting SpecModule has DeprecationReason "Use module foo instead"
  - id: AC-031
    description: deprecation_reason is cleared when status moves away from deprecated
    given: Change 1 sets status deprecated with a deprecation_reason, Change 2 sets status draft
    when: Project() is called
    then: The resulting SpecModule has DeprecationReason empty
  - id: AC-032
    description: 'Validation: depending on a deprecated module emits a warning'
    given: Module A depends on module B, and module B's spec.yaml has status deprecated
    when: Validate() is called for module A with a specsRoot that contains B's spec.yaml
    then: A ValidationWarning is returned for the dependency naming module B as deprecated
  - id: AC-033
    description: 'Validation: depending on a non-deprecated module emits no warning'
    given: Module A depends on module B, and module B's spec.yaml has status draft
    when: Validate() is called for module A
    then: No ValidationWarning is returned for that dependency
  - id: AC-034
    description: 'Validation: removed module does not emit a deprecation warning'
    given: Module A depends on module B, and module B's spec.yaml has status removed
    when: Validate() is called for module A
    then: No ValidationWarning is returned about deprecation for that dependency (the existing broken-dependency error check covers removed modules separately)
  - id: AC-035
    description: eigen spec list hides removed modules by default
    given: A removed module exists in the specs directory
    when: eigen spec list is run without flags
    then: The removed module does not appear in the output
  - id: AC-036
    description: eigen spec list --all shows removed modules
    given: A removed module exists in the specs directory
    when: eigen spec list --all is run
    then: The removed module appears in the output with status "removed"
  - id: AC-037
    description: eigen spec list shows a deprecated indicator for deprecated modules
    given: A module with status deprecated exists
    when: eigen spec list is run
    then: The module appears in the output with status "deprecated" visually distinct (e.g. marked [deprecated] or shown in a distinct column value)
  - id: AC-038
    description: eigen serve UI shows a deprecated badge on deprecated modules
    given: A module with status deprecated is loaded by the spec navigator
    when: A user views the module in the eigen serve UI
    then: The module detail page and list entry display a visible deprecated indicator with the deprecation_reason text
  - id: AC-039
    description: eigen serve UI omits removed modules from default navigation
    given: A module with status removed exists
    when: A user opens the spec navigator UI without any special filter
    then: The removed module does not appear in the module list or navigation tree
  - id: AC-040
    description: Test coverage for deprecated/removed projection paths
    given: The implementation is complete
    when: The test files are checked
    then: eigen/internal/spec/projection_test.go includes table-driven cases for deprecated and removed status projection, and eigen/internal/spec/validation_test.go includes cases for the deprecated-dependency warning
  - id: AC-041
    description: Module status is promoted to compiled when all changes are compiled
    given: A module whose every change has top-level Status "compiled"
    when: Project() is called
    then: The resulting SpecModule has Status "compiled", even if an earlier change set ChangeSet.Status to "draft"
  - id: AC-042
    description: Mixed compiled/non-compiled changes do not trigger promotion
    given: A module with two changes where one has Status "compiled" and one has Status "draft"
    when: Project() is called
    then: The module status reflects the last explicit ChangeSet.Status value, not "compiled"
  - id: AC-043
    description: deprecated status takes precedence over compiled promotion
    given: A module where all changes have top-level Status "compiled" but the last change sets ChangeSet.Status to "deprecated"
    when: Project() is called
    then: The resulting SpecModule has Status "deprecated", not "compiled"
  - id: AC-044
    description: removed status takes precedence over compiled promotion
    given: A module where all changes have top-level Status "compiled" but the last change sets ChangeSet.Status to "removed"
    when: Project() is called
    then: The resulting SpecModule has Status "removed", not "compiled"
  - id: AC-045
    description: 'Projection: replace op substitutes first occurrence in field'
    given: A projected behavior contains "foo bar foo" and a change has behavior as a sequence with op replace, old "foo", new "baz"
    when: Project() is called
    then: The resulting behavior is "baz bar foo" (only first occurrence replaced)
  - id: AC-046
    description: 'Projection: prepend op inserts text before field value'
    given: A projected description is "existing text" and a change has description as a sequence with op prepend, text "new intro\n\n"
    when: Project() is called
    then: The resulting description is "new intro\n\nexisting text"
  - id: AC-047
    description: 'Projection: append op inserts text after field value'
    given: A projected description is "existing text" and a change has description as a sequence with op append, text "\n\nnew footer"
    when: Project() is called
    then: The resulting description is "existing text\n\nnew footer"
  - id: AC-048
    description: 'Projection: delete op removes first occurrence of text'
    given: A projected behavior is "A B C B" and a change has behavior as a sequence with op delete, text "B "
    when: Project() is called
    then: The resulting behavior is "A C B" (only first occurrence removed)
  - id: AC-049
    description: 'Projection: multiple ops in a single change are applied sequentially'
    given: A projected behavior is "A B C" and a change has behavior as a sequence with two ops, first replace old "A" new "X", then append text " D"
    when: Project() is called
    then: The resulting behavior is "X B C D"
  - id: AC-050
    description: 'Projection: scalar string value is a full replacement (backward compatible)'
    given: A change sets behavior as a plain YAML scalar string "new text"
    when: Project() is called
    then: The resulting behavior is "new text" (full replacement, same as current last-write-wins)
  - id: AC-051
    description: 'Projection: replace op with no match returns a projection error'
    given: A projected behavior is "hello world" and a change has behavior as a sequence with op replace, old "xyz", new "abc"
    when: Project() is called
    then: Returns an error indicating that the replace target "xyz" was not found in the behavior field
  - id: AC-052
    description: 'Projection: delete op with no match returns a projection error'
    given: A projected behavior is "hello world" and a change has behavior as a sequence with op delete, text "xyz"
    when: Project() is called
    then: Returns an error indicating that the delete target "xyz" was not found in the behavior field
  - id: AC-053
    description: 'Projection: ops apply against current projected value, not original'
    given: Change 1 sets description to "A B C" (scalar), Change 2 has description as a sequence with replace old "B" new "X", Change 3 has description as a sequence with replace old "X" new "Y"
    when: Project() is called
    then: The resulting description is "A Y C"
  - id: AC-054
    description: 'ValidateChanges: op-based change that produces identical text is flagged as no-op'
    given: A projected behavior is "hello" and a change has behavior as a sequence with op prepend, text "" (empty prepend, result identical)
    when: ValidateChanges() is called
    then: Returns a ValidationError for the behavior field with a no-op message
  - id: AC-055
    description: 'ValidateChanges: op-based change that modifies the text is not flagged'
    given: A projected behavior is "hello world" and a change has behavior as a sequence with op replace, old "hello", new "goodbye"
    when: ValidateChanges() is called
    then: No ValidationError is returned for the behavior field
  - id: AC-056
    description: TextChange type uses yaml.Unmarshaler for polymorphic deserialization
    given: The implementation is complete
    when: The types are inspected
    then: TextChange implements yaml.Unmarshaler; ChangeSet Description and Behavior fields are typed TextChange (not string); TextOp has fields Op, Old, New, Text with yaml tags "op", "old", "new", "text"
  - id: AC-057
    description: Test coverage for inline polymorphic text ops
    given: The implementation is complete
    when: The test files are checked
    then: eigen/internal/spec/projection_test.go includes table-driven cases covering replace, prepend, append, delete, multi-op, scalar-full-replace, replace-no-match-error, delete-no-match-error scenarios; eigen/internal/spec/validation_test.go includes cases for op-based no-op detection
dependencies: []
technology: {}
