summary: Introduce compiled_commits field to link spec history to one or more code commits
reason: |
  When a change is marked compiled, there is currently no record of which git
  commits implement it. Adding a compiled_commits array field creates a durable
  link between the spec change trail and the code change trail, and supports the
  case where a compile-agent makes multiple commits while implementing a single
  change. Each commit hash is appended to the array as it is made, so the full
  set of implementing commits is recorded.
status: compiled
compiled_commits:
