id: chg-002
sequence: 2
timestamp: 2026-03-20T20:00:00Z
author: alexander
type: updated
summary: Add ValidateChanges to detect no-op fields in a changeset
reason: |
  cmd-event needs to reject changesets where individual fields are
  identical to the current spec state. The projection engine already
  owns the projection logic and types, making it the right home for
  ValidateChanges.
status: compiled
changes:
  behavior: |
    Events are applied in ascending sequence order. Simple fields (title, owner,
    status, description, behavior, technology) use last-write-wins semantics.
    Acceptance criteria are merged by id: new ids are added, existing ids are
    updated in place, and criteria with removed: true are dropped from the
    projection. After each projection the spec.yaml metadata fields last_event
    and events_count are updated automatically.

    ValidateChanges(current SpecModule, changes ChangeSet) compares each
    present field in changes against the current projection and returns a
    ValidationError for each field whose value is identical to the current
    state. For acceptance criteria, identity is checked per-criterion by id:
    an AC in changes is a no-op if an AC with the same id already exists in
    the projection with identical description, given, when, and then.
  acceptance_criteria:
    - id: AC-006
      description: ValidateChanges flags a simple field equal to current state
      given: A projected SpecModule with title "Foo"
      when: ValidateChanges is called with a ChangeSet setting title to "Foo"
      then: Returns a ValidationError naming the title field as a no-op
    - id: AC-007
      description: ValidateChanges flags an AC identical to current state
      given: A projected SpecModule containing AC-001 with specific given/when/then
      when: ValidateChanges is called with a ChangeSet containing AC-001 with identical fields
      then: Returns a ValidationError naming AC-001 as a no-op
    - id: AC-008
      description: ValidateChanges allows an AC that differs in any field
      given: A projected SpecModule containing AC-001
      when: ValidateChanges is called with AC-001 where only the then field differs
      then: Returns no error for that AC
    - id: AC-009
      description: ValidateChanges allows a new AC id not present in current state
      given: A projected SpecModule with no AC-002
      when: ValidateChanges is called with a ChangeSet introducing AC-002
      then: Returns no error for AC-002
