id: spec-navigator/change-review
domain: spec-navigator
module: change-review
owner: eigen
title: Change Review
status: draft
description: |
    spec-navigator/change-review defines the HTTP API and server-side session
    management for the change-file review handoff. When eigen-change finishes
    writing a spec change, it POSTs the change to the navigator, which creates
    a review session and exposes it in the browser UI. The skill then polls
    GET /api/reviews/<change-id> until the reviewer submits their decision
    (approved or rejected with optional comments), at which point the skill
    reads the result and continues the workflow.
behavior: |
    POST /api/reviews now accepts a batch request body:
      { "module_path": string, "changes": [ { "change_id", "file_path", "change_yaml" } ] }
    Response: 201 Created with body { "session_id": "<uuid>" }.
    The session_id is a server-generated UUID (not the caller-supplied change_id).
    No 409 Conflict on duplicate: each POST creates a new independent session.

    GET /api/reviews/<session-id> returns the session state keyed by session_id.
      Response fields: session_id, module_path, changes (array), status, decision,
      change_comments (map keyed by change_id). Otherwise unchanged.

    POST /api/reviews/<session-id>/submit body is:
      { "decision": "approved" | "rejected", "change_comments": { "<change_id>": "<comment>" } }
    (replaces the single "comments" string with a per-change map)

    GET /api/reviews/pending (new endpoint) returns { "session_id": "<uuid>" } for
    the first pending session, or 204 No Content when none exist. The UI polls this
    endpoint to discover new sessions without knowing session IDs in advance.
acceptance_criteria:
    - id: AC-001
      description: POST /api/reviews creates a pending review session
      given: eigen-change POSTs a new review with change_id "chg-003", module_path "spec-cli/cmd-new", and change_yaml content
      when: POST /api/reviews is received
      then: server responds 201 with body {"review_id":"chg-003"} and internally stores a session with status "pending"
    - id: AC-002
      description: GET /api/reviews/<change-id> returns pending status before submission
      given: a review session for "chg-003" was created and the reviewer has not yet acted
      when: GET /api/reviews/chg-003 is requested
      then: response is 200 with status "pending", decision "", comments ""
    - id: AC-003
      description: reviewer submits approval via POST /api/reviews/<change-id>/submit
      given: a pending review session for "chg-003" exists
      when: POST /api/reviews/chg-003/submit is sent with {"decision":"approved","comments":""}
      then: response is 200; subsequent GET /api/reviews/chg-003 returns status "submitted", decision "approved"
    - id: AC-004
      description: reviewer submits rejection with comments
      given: a pending review session for "chg-003" exists
      when: POST /api/reviews/chg-003/submit is sent with {"decision":"rejected","comments":"needs clearer AC"}
      then: subsequent GET /api/reviews/chg-003 returns status "submitted", decision "rejected", comments "needs clearer AC"
    - id: AC-005
      description: eigen-change polls until status is submitted
      given: eigen-change created a review session and polls every 3 seconds
      when: the reviewer submits after 9 seconds
      then: eigen-change detects the submitted status on the next poll and stops polling
    - id: AC-006
      description: GET for unknown change-id returns 404
      given: no review session exists for "chg-999"
      when: GET /api/reviews/chg-999 is requested
      then: response is 404 with JSON error body
    - id: AC-007
      description: duplicate POST for same change-id returns 409
      given: a review session for "chg-003" already exists
      when: POST /api/reviews is sent again with change_id "chg-003"
      then: response is 409 Conflict
    - id: AC-008
      description: approved decision causes eigen-change to proceed to compile
      given: eigen-change is polling and receives status "submitted" with decision "approved"
      when: the poll result is read
      then: eigen-change proceeds to the compile phase without asking the user an additional question
    - id: AC-009
      description: rejected decision causes eigen-change to run the spec feedback loop
      given: eigen-change is polling and receives status "submitted" with decision "rejected" and non-empty comments
      when: the poll result is read
      then: eigen-change uses the comments as feedback, invokes spec-agent to write a new change file, then restarts the spec phase
    - id: AC-010
      description: review panel is visible in the UI for pending sessions
      given: a pending review session exists
      when: the spec-navigator UI is open
      then: an active review panel is displayed showing the change YAML; Approve and Reject buttons are present
dependencies:
    - spec-navigator/api
    - spec-navigator/ui
    - ai-agent/skill-change
technology:
    DecisionValues: approved, rejected
    Endpoints: POST /api/reviews, GET /api/reviews/<session-id>, POST /api/reviews/<session-id>/submit, GET /api/reviews/pending
    PollingInterval: 3 seconds
    SessionID: server-generated UUID (crypto/rand)
    SessionStorage: in-memory only (no disk persistence)
last_change: chg-002
changes_count: 2
