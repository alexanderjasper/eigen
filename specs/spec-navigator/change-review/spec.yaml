format: eigen/v1
id: spec-navigator/change-review
domain: spec-navigator
module: change-review
owner: eigen
title: Change Review
status: compiled
description: |
  spec-navigator/change-review defines the HTTP API for approving or rejecting
  individual change files via the spec-navigator. There are no review sessions —
  the change files themselves carry their status (draft, approved, compiled) and
  an optional review_comment field. The UI reads draft changes from the existing
  module changes endpoint and writes decisions back via approve/reject endpoints.
  The eigen-change skill polls the module changes endpoint and watches for status
  transitions instead of polling a session endpoint.
behavior: |
  The session-based review API is removed entirely (unchanged from chg-002).

  Two endpoints remain (unchanged from chg-002):
  POST /api/modules/<module-path>/changes/<filename>/approve
  POST /api/modules/<module-path>/changes/<filename>/reject

  review_comment field, SetChangeComment storage function, and eigen spec
  change-comment CLI command are unchanged from chg-002.

  UI pending-review polling is replaced as follows:

  startReviewPoller() is replaced with a setTimeout-chain implementation.
  A module-level variable `reviewPollerTimer` holds the current pending
  setTimeout handle (or null when stopped).

  Polling behaviour:
  - Fixed poll interval is 3000ms.
  - No backoff and no consecutive-no-draft counter.
  - After each poll (whether draft changes are found or not), the next poll
    is scheduled 3000ms after the current fetch resolves or rejects.
  - When the review panel becomes visible (showReviewPanel is called), polling
    is paused: the pending setTimeout is cleared and reviewPollerTimer is set
    to null. Polling does not restart until the panel is hidden.
  - When the review panel is hidden (hideReviewPanel is called), polling
    resumes: the next poll is scheduled 3000ms later.
  - stopReviewPoller() clears the pending timer and sets reviewPollerTimer to
    null. It is called on hideReviewPanel and may be called at any time to
    halt polling.
  - The poller uses a setTimeout chain: the next poll is scheduled only after
    the current fetch resolves (or rejects), so slow server responses cannot
    cause poll requests to stack.

  All other UI behaviour is unchanged from chg-002.
acceptance_criteria:
  - id: AC-012
    description: approve endpoint sets change file status to approved
    given: a module "test-mod" exists with a draft change file "002_feature.yaml"
    when: POST /api/modules/test-mod/changes/002_feature.yaml/approve is sent
    then: response status is 200; body contains status approved; the change file on disk has status approved
  - id: AC-013
    description: approve endpoint returns 404 for non-existent change file
    given: no change file named "999_missing.yaml" exists for module "test-mod"
    when: POST /api/modules/test-mod/changes/999_missing.yaml/approve is sent
    then: response status is 404; body contains an "error" key
  - id: AC-014
    description: reject endpoint writes review_comment and keeps status as draft
    given: a module "test-mod" exists with a draft change file "002_feature.yaml"
    when: POST /api/modules/test-mod/changes/002_feature.yaml/reject is sent with body containing comment 'needs more detail on edge cases'
    then: response status is 200; body contains status draft and review_comment with the given comment; the change file on disk has review_comment set and status remains draft
  - id: AC-015
    description: reject endpoint returns 400 when comment is missing or empty
    given: a module "test-mod" exists with a draft change file "002_feature.yaml"
    when: POST /api/modules/test-mod/changes/002_feature.yaml/reject is sent with an empty or missing comment field
    then: response status is 400; body contains an "error" key
  - id: AC-016
    description: reject endpoint returns 404 for non-existent change file
    given: no change file named "999_missing.yaml" exists for module "test-mod"
    when: POST /api/modules/test-mod/changes/999_missing.yaml/reject is sent with body containing a comment
    then: response status is 404; body contains an "error" key
  - id: AC-017
    description: review_comment field is present in Change struct and persisted to YAML
    given: a change file exists with no review_comment
    when: storage.SetChangeComment is called with a non-empty comment string
    then: the change file on disk contains a review_comment field with the given value; reading the file back via storage.ReadChanges returns the comment in the ReviewComment field
  - id: AC-018
    description: review_comment is returned by the changes API endpoint
    given: a change file has a review_comment set
    when: GET /api/modules/test-mod/changes is requested
    then: the response JSON array includes the change with its review_comment field populated
  - id: AC-019
    description: CLI change-comment command writes review_comment to a change file
    given: a module test-mod exists with a change file 002_feature.yaml
    when: eigen spec change-comment test-mod 002_feature.yaml 'needs edge case handling' is run
    then: the command exits 0; the change file on disk contains review_comment 'needs edge case handling'
  - id: AC-020
    description: UI filters draft changes for pending review display
    given: a module has changes with statuses draft, approved, and compiled
    when: the UI pending-review panel loads
    then: only changes with status draft (or absent status) are shown in the review list
  - id: AC-021
    description: agent polls module changes endpoint for status transitions
    given: eigen-change has written draft change files for a module
    when: the agent polls GET /api/modules/test-mod/changes
    then: the agent detects when all draft changes transition to approved and proceeds to compile; if any change has a review_comment, the agent uses it as feedback for the spec-agent
  - id: AC-022
    description: reviews.go file is removed or gutted
    given: the session-based review code exists in eigen/internal/server/reviews.go
    when: this change is implemented
    then: reviews.go is deleted and all review route registrations are removed from server.go
  - id: AC-023
    description: poller uses setTimeout chain not setInterval
    given: the review poller is running
    when: inspecting the implementation
    then: no setInterval call exists in startReviewPoller; the next poll is scheduled with setTimeout only after the current fetch resolves or rejects
  - id: AC-024
    description: fixed poll interval is 3000ms
    given: the review poller is running
    when: any poll callback completes (regardless of whether draft changes were found)
    then: the next poll is scheduled 3000ms later; there is no varying interval and no consecutive-no-draft counter
  - id: AC-025
    description: polling pauses when the review panel becomes visible
    given: the review poller is running with a pending setTimeout
    when: showReviewPanel is called (draft changes found)
    then: the pending setTimeout is cleared and no new poll is scheduled until the panel is hidden
  - id: AC-026
    description: polling resumes when the review panel is hidden
    given: polling was paused because the review panel was visible
    when: hideReviewPanel is called
    then: the next poll is scheduled 3000ms later and polling continues at the fixed interval
  - id: AC-027
    description: stopReviewPoller clears the pending timer
    given: a setTimeout is pending for the next poll
    when: stopReviewPoller() is called
    then: the timer is cleared, reviewPollerTimer is null, and no further polls are scheduled
  - id: AC-028
    description: slow server response does not cause poll stacking
    given: the server takes longer than 3000ms to respond to a fetch
    when: the timeout would have fired a second time under setInterval
    then: no second fetch is issued until the first fetch resolves and schedules the next poll
dependencies:
  - spec-navigator/api
  - spec-navigator/ui
  - ai-agent/skill-change
technology:
  BackoffThreshold: removed
  DecisionValues: approved, rejected
  Endpoints: POST /api/modules/<path>/changes/<filename>/approve, POST /api/modules/<path>/changes/<filename>/reject
  NewCLICommand: eigen spec change-comment <module-path> <filename> <comment>
  NewField: 'spec.Change.ReviewComment (yaml: review_comment)'
  NewStorageFunc: SetChangeComment
  PollingInterval: 3000ms fixed (no backoff)
  PollingMechanism: setTimeout chain (not setInterval)
  RemovedEndpoints: POST /api/reviews, GET /api/reviews/pending, GET /api/reviews/<session-id>, POST /api/reviews/<session-id>/submit
  RemovedTypes: ReviewSession, ChangeEntry, reviewStore, generateSessionID
  SessionID: server-generated UUID (crypto/rand)
  SessionStorage: in-memory only (no disk persistence)
last_change: chg-004
changes_count: 4
