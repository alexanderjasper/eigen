id: spec-navigator/ui
domain: spec-navigator
module: ui
owner: eigen
title: Spec Navigator UI
status: draft
description: |
    The spec navigator UI is a single-page browser application embedded in
    the eigen binary. It renders a two-pane layout: a collapsible module
    tree on the left and a detail pane on the right. No build step is
    required — it is vanilla HTML, CSS, and JavaScript.
behavior: |
    On load the UI fetches /api/modules and builds a tree from the flat
    list by splitting paths on "/". Parent nodes are collapsible and
    expanded by default. Clicking any node fetches the module detail and
    changes from the API and renders them in the right pane.

    The search box filters visible tree nodes in real time (client-side)
    by matching the query against both the module path and title.

    The detail pane shows: title, status badge (colour-coded by status),
    owner, description, behavior, acceptance criteria (as a list with
    given/when/then), dependencies (as clickable links that navigate to
    that module), and a history section with the change timeline.
acceptance_criteria:
    - id: AC-001
      description: tree is built from flat module list
      given: /api/modules returns modules at a, a/b, and c
      when: the page loads
      then: the tree shows a as a parent with b as a child, and c as a sibling
    - id: AC-002
      description: parent nodes are collapsible
      given: module a has children
      when: the user clicks the a node toggle
      then: the children are hidden; clicking again expands them
    - id: AC-003
      description: clicking a node loads its detail
      given: the user clicks spec-cli/cmd-new in the tree
      when: the click handler fires
      then: the right pane shows the title, status, owner, and AC for cmd-new
    - id: AC-004
      description: search filters tree by path and title
      given: modules projection-engine and spec-cli exist
      when: the user types "proj" in the search box
      then: only projection-engine is visible in the tree
    - id: AC-005
      description: status badge is colour-coded
      given: a module with status draft is displayed
      when: the detail pane renders
      then: the status badge uses the draft colour (yellow)
    - id: AC-006
      description: dependency links navigate to that module
      given: the detail pane shows a dependency on spec-cli/cmd-new
      when: the user clicks the dependency link
      then: the right pane updates to show cmd-new detail and the tree highlights it
    - id: AC-007
      description: history section shows change timeline
      given: a module has two changes
      when: the detail pane renders
      then: the history section lists both changes with sequence, timestamp, author, and summary
dependencies: []
technology: {}
