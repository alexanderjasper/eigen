id: chg-003
sequence: 3
timestamp: "2026-03-21T12:59:15Z"
author: alexander
type: updated
summary: Add review session endpoints (POST /api/reviews, GET /api/reviews/<id>, POST submit)
reason: |
    The change-review flow requires three new endpoints on the navigator API so that
    eigen-change can create a review session, poll for its status, and the UI can
    submit the reviewer's decision. These endpoints are owned by spec-navigator/change-review
    but served by the same HTTP server as the existing module API.
status: approved
changes:
    behavior: |
        GET /api/modules returns a flat list of ModuleSummary objects for all
        modules under the specs root. Each summary includes path, title, owner,
        status, and a children flag indicating whether any other module path
        starts with this path followed by a slash.

        GET /api/modules/*path returns the full SpecModule projection for the
        module at the given path.

        GET /api/modules/*path/changes returns the ordered slice of Changes
        for the module at the given path.

        POST /api/reviews creates a new in-memory review session.
        Request body: { "change_id": string, "module_path": string, "change_yaml": string }.
        Response: 201 { "review_id": "<change_id>" }. Returns 409 if a session for
        that change_id already exists.

        GET /api/reviews/<change-id> returns the current review session state.
        Response: { "review_id": string, "status": "pending"|"submitted",
        "decision": ""|"approved"|"rejected", "comments": string }.
        Returns 404 if no session exists.

        POST /api/reviews/<change-id>/submit records the reviewer's decision.
        Request body: { "decision": "approved"|"rejected", "comments": string }.
        Transitions session status to "submitted". Returns 200 on success,
        404 if no session exists.

        All endpoints return JSON with Content-Type application/json. Errors
        return a JSON object with an "error" key and an appropriate HTTP status.
    acceptance_criteria:
        - id: AC-007
          description: POST /api/reviews creates a pending review session
          given: eigen-change POSTs change_id "chg-003" with valid module_path and change_yaml
          when: POST /api/reviews is received
          then: server responds 201 with {"review_id":"chg-003"} and stores the session with status "pending"
        - id: AC-008
          description: GET /api/reviews/<change-id> returns current session state
          given: a review session for "chg-003" exists with status "pending"
          when: GET /api/reviews/chg-003 is requested
          then: response is 200 with status "pending", decision "", comments ""
        - id: AC-009
          description: POST /api/reviews/<change-id>/submit transitions session to submitted
          given: a pending session for "chg-003" exists
          when: POST /api/reviews/chg-003/submit is sent with {"decision":"approved","comments":""}
          then: response is 200; subsequent GET returns status "submitted", decision "approved"
        - id: AC-010
          description: GET /api/reviews for unknown change-id returns 404
          given: no session exists for "chg-999"
          when: GET /api/reviews/chg-999 is requested
          then: response is 404 with JSON error body
