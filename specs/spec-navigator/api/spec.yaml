format: eigen/v1
id: spec-navigator/api
domain: spec-navigator
module: api
owner: eigen
title: Spec Navigator API
status: draft
description: |
  The spec navigator API is a set of JSON endpoints served by eigen serve.
  It exposes module listings and per-module detail (projection + changes)
  so the frontend can render the spec tree and detail pane, grouped by worktree.
  It also serves the review session endpoints used by the change-review flow.

  Each ModuleSummary and full SpecModule response now includes two additional
  fields: `worktree` (the registered name, or "main" for the main repository)
  and `branch` (the git branch name of that worktree). These fields allow the
  UI to group and label modules without making additional API calls.

  A GET /api/worktrees endpoint exposes the current registered worktree list so
  the UI can render navigation groupings independently of module data.
behavior: |
  GET /api/modules returns a flat list of ModuleSummary objects for all modules
  across all registered worktrees plus the main repository. Each summary includes
  path, title, owner, status, children flag, `worktree` (name or "main"), and
  `branch` (git branch string). Results from the main repo appear first; results
  from each registered worktree follow in registration order.

  GET /api/modules/*path returns the full SpecModule projection for the module
  at the given path. The path is disambiguated by an optional `?worktree=<name>`
  query parameter when the same module path exists in multiple worktrees. If the
  parameter is absent and the path is unambiguous, it resolves normally. If
  ambiguous and no query parameter is provided, the API returns 409 with an error
  listing the conflicting worktree names.

  GET /api/modules/*path/changes returns the ordered slice of Changes for the
  module at the given path, with the same `?worktree=<name>` disambiguation rule.

  GET /api/worktrees returns the current registered worktree list as a JSON array.
  Each entry includes: `name` (string), `branch` (string), `path` (string),
  `status` ("active" | "orphaned"). The main repository is always included as the
  first entry with `name: "main"`.

  POST /api/reviews, GET /api/reviews/<change-id>, and POST /api/reviews/<change-id>/submit
  are unchanged.

  All endpoints return JSON with Content-Type application/json. Errors return a
  JSON object with an "error" key and an appropriate HTTP status.
acceptance_criteria:
  - id: AC-001
    description: GET /api/modules returns a JSON array of all discovered modules
    given: the specs root contains modules at paths "spec-cli" and "spec-cli/cmd-new"
    when: GET /api/modules is requested
    then: response status is 200 with Content-Type application/json; body is a JSON array containing a ModuleSummary for each module with path, title, owner, status, and children fields
  - id: AC-002
    description: children flag reflects whether sub-modules exist
    given: module "spec-cli" has sub-module "spec-cli/cmd-new", and "spec-cli/cmd-new" has no sub-modules
    when: GET /api/modules is requested
    then: the ModuleSummary for "spec-cli" has children true; the ModuleSummary for "spec-cli/cmd-new" has children false
  - id: AC-003
    description: GET /api/modules/*path returns the full module projection
    given: module "spec-cli/cmd-new" exists with a valid spec.yaml
    when: GET /api/modules/spec-cli/cmd-new is requested
    then: response status is 200; body is the full SpecModule JSON including all projected fields such as title, description, behavior, and acceptance_criteria
  - id: AC-004
    description: GET /api/modules/*path/changes returns change files in sequence order
    given: module "spec-cli" has two change files with sequences 1 and 2
    when: GET /api/modules/spec-cli/changes is requested
    then: response status is 200; body is a JSON array of both changes ordered by ascending sequence number
  - id: AC-005
    description: requesting a non-existent module returns 404
    given: no module exists at path "nonexistent"
    when: GET /api/modules/nonexistent is requested
    then: response status is 404; body is a JSON object with an "error" key
  - id: AC-006
    description: requesting changes for a non-existent module returns 404
    given: no module exists at path "nonexistent"
    when: GET /api/modules/nonexistent/changes is requested
    then: response status is 404; body is a JSON object with an "error" key
  - id: AC-007
    description: GET /api/modules includes worktree and branch fields on every ModuleSummary
    given: eigen serve has two registered worktrees — main (branch main) and feature-foo (branch feature/foo)
    when: GET /api/modules is requested
    then: |
      Every ModuleSummary in the response has a non-empty `worktree` field and a
      non-empty `branch` field; modules from the main repo have worktree="main";
      modules from the registered worktree have worktree="feature-foo" and
      branch="feature/foo"
  - id: AC-008
    description: GET /api/modules lists modules from all registered worktrees
    given: The main repo has module "spec-cli" and worktree feature-foo has module "spec-cli" with a different change
    when: GET /api/modules is requested
    then: |
      Both occurrences of "spec-cli" appear in the response, distinguished by
      their worktree field; neither is omitted
  - id: AC-009
    description: GET /api/worktrees returns the registered worktree list with status
    given: Two worktrees are registered — main and feature-foo; feature-foo's path exists on disk
    when: GET /api/worktrees is requested
    then: |
      Response status is 200; body is a JSON array with two entries; the first
      entry has name="main"; the second has name="feature-foo", branch="feature/foo",
      status="active"
  - id: AC-010
    description: GET /api/worktrees marks orphaned entries
    given: .eigen/worktrees.json contains an entry whose path no longer exists on disk
    when: GET /api/worktrees is requested
    then: The corresponding entry has status="orphaned"
  - id: AC-011
    description: GET /api/modules/*path with unambiguous path resolves without query param
    given: spec-cli exists only in the main repo
    when: GET /api/modules/spec-cli is requested (no ?worktree param)
    then: Response status is 200 and the module data is returned normally
  - id: AC-012
    description: GET /api/modules/*path with ambiguous path and no query param returns 409
    given: spec-cli exists in both main and worktree feature-foo
    when: GET /api/modules/spec-cli is requested without a ?worktree query parameter
    then: |
      Response status is 409; body is a JSON object with an "error" key and a
      "worktrees" key listing the conflicting worktree names
  - id: AC-013
    description: GET /api/modules/*path?worktree=<name> resolves the correct copy
    given: spec-cli exists in both main and worktree feature-foo
    when: GET /api/modules/spec-cli?worktree=feature-foo is requested
    then: Response status is 200 and returns the module data from feature-foo
