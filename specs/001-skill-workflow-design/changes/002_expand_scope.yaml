summary: Refactor skill system to use subagent orchestration instead of separate skills
reason: |-
  The current eigen-spec/eigen-plan/eigen-compile skill model requires separate invocations and manual
  coordination. Consolidating into a single `change` skill with subagent-based phases improves UX,
  eliminates context switching, and provides structured approval gates. This enables deprecating
  redundant skill definitions and simplifying the overall skill system.
type: updated
changes:
  description: |-
    Consolidate feature development into a single `change` skill that uses subagents for speccing,
    planning, and implementation phases. This replaces the current separate eigen-spec, eigen-plan,
    and eigen-compile skills with a unified workflow. The `change` skill invokes specialized subagents
    (spec-subagent, plan-subagent, compile-subagent) that have access to the codebase and can
    ask clarifying questions, design solutions, and implement code. User reviews output after each
    phase, can provide feedback on rejections, and approves progression.
  acceptanceCriteria:
    - id: AC-006
      description: |-
        The `change` skill completely subsumes the functionality of eigen-spec, eigen-plan, and
        eigen-compile. A user creating a feature no longer invokes three separate skills.
    - id: AC-007
      description: |-
        After `change` skill launches, deprecate eigen-spec, eigen-plan, and eigen-compile skills
        or mark them as legacy. Determine if they should remain available or be removed entirely.
    - id: AC-008
      description: |-
        The spec-subagent used by `change` skill should be able to ask the same clarifying
        questions that human using eigen-spec would ask (based on current eigen-spec skill definition).
  dependencies:
    - Analysis of which parts of eigen-spec/plan/compile skill definitions can be reused in subagent prompts
    - Decision on whether to keep legacy skills available or deprecate them
