id: 001-skill-workflow-design
domain: 001-skill-workflow-design
module: 001-skill-workflow-design
owner: alexander
title: Multi-phase change workflow with subagent orchestration
status: ""
description: |-
    Create a new `change` skill that orchestrates a three-phase workflow for feature development.
    When invoked with a feature description, it launches specialized subagents:
    (1) spec subagent asks clarifying questions and produces spec in eigen-spec format (changes/ + spec.yaml),
    (2) plan subagent designs the implementation in markdown,
    (3) compile subagent implements the code.
    User reviews outputs and approves after each phase. If rejected, user provides feedback and subagent re-runs with the comments.
behavior: ""
dependencies:
    - Agent tool (for subagent orchestration)
    - Existing eigen-spec format (for spec output)
    - Existing eigen-plan format (for plan output)
technology:
    Claude-API: Claude Opus 4.6 (or latest)
    OutputFormats: changes/*.yaml, spec.yaml, markdown
    SubagentTypes: spec-subagent, plan-subagent, compile-subagent
last_change: ""
changes_count: 1
