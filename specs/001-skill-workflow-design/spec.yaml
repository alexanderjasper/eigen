id: 001-skill-workflow-design
domain: 001-skill-workflow-design
module: 001-skill-workflow-design
owner: alexander
title: Multi-phase change workflow with subagent orchestration
status: ""
description: |-
    Consolidate feature development into a single `change` skill that uses subagents for speccing,
    planning, and implementation phases. This replaces the current separate eigen-spec, eigen-plan,
    and eigen-compile skills with a unified workflow. The `change` skill invokes specialized subagents
    (spec-subagent, plan-subagent, compile-subagent) that have access to the codebase and can
    ask clarifying questions, design solutions, and implement code. User reviews output after each
    phase, can provide feedback on rejections, and approves progression.
behavior: ""
dependencies:
    - Analysis of which parts of eigen-spec/plan/compile skill definitions can be reused in subagent prompts
    - Decision on whether to keep legacy skills available or deprecate them
technology:
    Claude-API: Claude Opus 4.6 (or latest)
    OutputFormats: changes/*.yaml, spec.yaml, markdown
    SubagentTypes: spec-subagent, plan-subagent, compile-subagent
last_change: ""
changes_count: 2
