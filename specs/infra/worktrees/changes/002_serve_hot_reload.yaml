summary: Specify hot-reload of worktree registry in eigen serve via fsnotify — add and remove
reason: |
  The initial spec (chg-001) stated that eigen serve "reloads the registry and begins
  watching the new worktree's specs directory without restarting" but gave no detail on
  the mechanism, did not specify the removal side, did not pin the GET /api/worktrees
  contract to live state, and did not address how the UI learns about worktree-set
  changes.

  A developer running eigen serve in the background while creating or removing worktrees
  in other terminals would see stale data in the UI until they manually restarted the
  server — defeating the unified dashboard goal. This change makes the hot-reload
  behaviour fully observable and testable by:
    1. Naming the file-watch mechanism (fsnotify or equivalent) for .eigen/worktrees.json.
    2. Specifying what happens on both addition and removal events.
    3. Requiring GET /api/worktrees and module listings to always reflect live state.
    4. Requiring the UI to refresh reactively (via its existing polling loop or
       SSE/websocket if one is already in the design) when the worktree set changes.
