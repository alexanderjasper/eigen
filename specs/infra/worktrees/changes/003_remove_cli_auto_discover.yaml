type: updated
summary: Remove worktree CLI commands; replace registry file with auto-discovery of .claude/worktrees/
reason: |
  The `eigen worktree create/list/remove` commands specced in chg-001 turned out to
  be unnecessary. Claude Code already creates worktrees at `.claude/worktrees/<name>/`
  as part of its own workflow (e.g. the eigen-change skill). Requiring developers to
  also run `eigen worktree create` adds friction without value.

  The `.eigen/worktrees.json` registry file (chg-001) and the fsnotify watch on it
  (chg-002) are both superseded: `eigen serve` now discovers worktrees by scanning
  `.claude/worktrees/` directly at startup, and watches that directory for new
  subdirectories appearing (or being removed) while serve is running. No registration
  step is required from the developer at all.

  The scaffold pre-commit hook fix (spec-cli/cmd-scaffold chg-008) was also found to
  be unnecessary: git worktrees share the main repo's `.git/hooks/` via the commondir
  mechanism, so a hook installed at the main repo root already runs in all worktrees.
status: compiled
