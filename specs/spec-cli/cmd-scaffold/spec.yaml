id: spec-cli/cmd-scaffold
domain: spec-cli
module: cmd-scaffold
owner: eigen
title: scaffold
status: draft
description: |
    The scaffold command initializes a project directory with the eigen Claude
    skills and agent definitions. It writes SKILL.md files for eigen-spec,
    eigen-plan, eigen-compile, and eigen-change under .claude/skills/, writes
    agent definition files for spec-agent, plan-agent, and compile-agent under
    .claude/agents/, and creates the specs/ directory. It is the intended
    starting point for any new project that will use eigen, and can be re-run
    with --force to update an existing project after an eigen upgrade.
behavior: |
    Accepts an optional path argument (defaults to the current working
    directory) and an optional --force flag. Creates
    .claude/skills/eigen-spec/SKILL.md, .claude/skills/eigen-plan/SKILL.md,
    .claude/skills/eigen-compile/SKILL.md, and
    .claude/skills/eigen-change/SKILL.md with the canonical skill content
    embedded in the binary. Creates .claude/agents/spec-agent.md,
    .claude/agents/plan-agent.md, and .claude/agents/compile-agent.md with the
    canonical agent definitions embedded in the binary. Creates the specs/
    directory if it does not already exist. Without --force, fails with a
    non-zero exit code if any skill or agent file already exists, listing each
    conflicting path, and writes nothing. With --force, removes any existing
    skill and agent files before writing, then proceeds normally. Prints a
    success message listing all created files and a next-step hint to run
    eigen spec new.
acceptance_criteria:
    - id: AC-001
      description: Creates all four skill files and three agent files in the target directory
      given: A target directory containing no existing eigen skill or agent files
      when: eigen scaffold <path> is run
      then: |
        Creates .claude/skills/eigen-spec/SKILL.md, .claude/skills/eigen-plan/SKILL.md,
        .claude/skills/eigen-compile/SKILL.md, and .claude/skills/eigen-change/SKILL.md,
        and .claude/agents/spec-agent.md, .claude/agents/plan-agent.md, and
        .claude/agents/compile-agent.md under <path>
    - id: AC-002
      description: Creates the specs directory if absent
      given: A target directory with no specs/ subdirectory
      when: eigen scaffold is run
      then: specs/ is created under the target directory
    - id: AC-003
      description: Defaults to current working directory
      given: No path argument is provided
      when: eigen scaffold is run
      then: All files are written relative to the current working directory
    - id: AC-004
      description: Fails without --force if any skill or agent file already exists
      given: At least one eigen skill or agent file already exists in the target directory
      when: eigen scaffold is run without --force
      then: Exits with a non-zero code and prints each conflicting path to stderr; no files are written or removed
    - id: AC-005
      description: Prints created files and next-step hint on success
      given: Scaffold completes successfully
      when: eigen scaffold is run
      then: Prints the paths of each created file and suggests running eigen spec new
    - id: AC-006
      description: --force removes existing skill and agent files before re-scaffolding
      given: One or more eigen skill or agent files already exist in the target directory
      when: eigen scaffold --force is run
      then: Removes each pre-existing skill and agent file, then writes all files with the current embedded content; exits zero and prints the recreated file paths
    - id: AC-007
      description: --force does not affect the specs/ directory
      given: A specs/ directory already exists containing spec files
      when: eigen scaffold --force is run
      then: The specs/ directory and its contents are left unchanged
dependencies: []
technology: {}
