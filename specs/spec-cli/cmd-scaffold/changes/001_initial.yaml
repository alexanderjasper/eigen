id: chg-001
sequence: 1
timestamp: "2026-03-20T21:28:21Z"
author: alexander
type: created
summary: Initial spec for eigen scaffold command
reason: |
    Users adopting eigen on a new project have no way to bootstrap the required
    Claude skill files. They must manually copy skill files from the eigen repo or
    know the expected directory structure. A scaffold command eliminates this
    friction by producing a ready-to-use project layout in one step.
changes:
    title: scaffold
    owner: eigen
    status: draft
    description: |
        The scaffold command initializes a new project directory with the eigen
        Claude skills. It writes the skill definition files for eigen-spec,
        eigen-plan, and eigen-compile under .claude/skills/, and creates the
        specs/ directory. It is the intended starting point for any new project
        that will use eigen.
    behavior: |
        Accepts an optional path argument (defaults to the current working
        directory). Creates .claude/skills/eigen-spec/SKILL.md,
        .claude/skills/eigen-plan/SKILL.md, and
        .claude/skills/eigen-compile/SKILL.md with the canonical skill content
        embedded in the binary. Creates the specs/ directory if it does not
        already exist. Fails with a non-zero exit code if any of the skill files
        already exist, to avoid silent overwrites. Prints a success message
        listing the created files and a next-step hint to run eigen spec new.
    acceptance_criteria:
        - id: AC-001
          description: Creates all three skill files in the target directory
          given: A target directory that contains no existing eigen skill files
          when: eigen scaffold <path> is run
          then: >
            Creates .claude/skills/eigen-spec/SKILL.md,
            .claude/skills/eigen-plan/SKILL.md, and
            .claude/skills/eigen-compile/SKILL.md under <path>
        - id: AC-002
          description: Creates the specs directory if absent
          given: A target directory with no specs/ subdirectory
          when: eigen scaffold is run
          then: specs/ is created under the target directory
        - id: AC-003
          description: Defaults to current working directory
          given: No path argument is provided
          when: eigen scaffold is run
          then: All files are written relative to the current working directory
        - id: AC-004
          description: Fails if skill files already exist
          given: At least one eigen skill file already exists in the target directory
          when: eigen scaffold is run
          then: Exits with a non-zero code and prints which file(s) already exist; no files are written
        - id: AC-005
          description: Prints created files and next-step hint on success
          given: Scaffold completes successfully
          when: eigen scaffold is run
          then: Prints the paths of each created file and suggests running eigen spec new
