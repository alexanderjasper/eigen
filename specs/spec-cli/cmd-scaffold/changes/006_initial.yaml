id: chg-006
sequence: 6
timestamp: "2026-03-30T07:41:35Z"
type: updated
summary: clarify that hook normalizes only spec.yaml; change files are CLI-canonical but hand-edits can drift
reason: |
  The user asked whether the pre-commit hook should also normalize change files,
  not just spec.yaml. Investigation of the storage layer shows that every write
  path for change files (WriteChange, SetChangeStatus, SetChangeComment) passes
  through marshalCanonical, so any change file produced or updated by the CLI is
  already in canonical form. However, hand-edited change files (or files written
  by agents directly to disk bypassing the storage layer) can drift from canonical
  form. There is no existing `eigen spec format` command to re-normalize change
  files. The hook therefore only needs to normalize spec.yaml via `project-all`
  today. A future `eigen spec format` command could extend the hook to also
  re-canonicalize change files; the hook design should not preclude this extension.
status: approved
changes:
  behavior: |
    Accepts an optional path argument (defaults to the current working directory),
    an optional --force flag, and an optional --no-hooks flag. Creates
    .claude/skills/eigen-change-spec/SKILL.md, .claude/skills/eigen-change-compile/SKILL.md,
    and .claude/skills/eigen-change/SKILL.md with the canonical skill content embedded
    in the binary. Creates .claude/agents/spec-agent.md, .claude/agents/plan-agent.md,
    and .claude/agents/compile-agent.md with the canonical agent definitions embedded
    in the binary. Creates the specs/ directory if it does not already exist. Without
    --force, fails with a non-zero exit code if any skill or agent file already exists,
    listing each conflicting path, and writes nothing. With --force, removes any
    existing skill and agent files before writing, then proceeds normally. Prints a
    success message listing all created files and a next-step hint to run eigen spec new.

    Unless --no-hooks is passed, also installs a git pre-commit hook under
    .git/hooks/pre-commit. If .git/hooks/pre-commit already exists, the eigen hook
    block is appended to the file rather than overwriting it. The hook script checks
    whether any files under specs/ are staged; if none are staged it exits 0 immediately.
    If spec files are staged it runs `eigen spec project-all` to normalize all spec.yaml
    files to canonical form, then runs `eigen spec validate`; if either command fails it
    prints a clear error message and exits non-zero, rejecting the commit. With --no-hooks,
    the hook installation step is skipped entirely; existing hook files are left unchanged.

    Change files written or updated by the CLI (via eigen spec change, eigen spec new,
    change-status, or change-comment) are always stored in canonical YAML form through
    the shared storage layer. There is no separate normalization step for change files
    in the hook today. A future `eigen spec format` command may add explicit
    re-canonicalization of change files (e.g. to normalize hand-edits); when that
    command exists, the hook block can be extended to run it as an additional step
    before project-all without changing the overall hook structure.
  acceptance_criteria:
    - id: AC-008
      description: Installs a pre-commit hook that reprojects and validates specs when spec files are staged
      given: A target directory whose .git/hooks/pre-commit does not exist
      when: eigen scaffold is run without --no-hooks
      then: |
        .git/hooks/pre-commit is created (mode 0755) containing a script that:
        (1) uses `git diff --cached --name-only` to list staged files,
        (2) exits 0 immediately if no file path starts with specs/,
        (3) runs `eigen spec project-all` to normalize all spec.yaml files to canonical
            form (change files written by the CLI are already canonical and do not
            need a separate normalization step),
        (4) runs `eigen spec validate` after project-all succeeds,
        (5) on non-zero exit from either command, prints an error message to stderr and
            exits non-zero so the commit is rejected
    - id: AC-014
      description: Hook script structure does not preclude future addition of eigen spec format
      given: The pre-commit hook installed by eigen scaffold
      when: A future `eigen spec format` command becomes available
      then: |
        The hook block is structured so that "eigen spec format" (change file
        re-canonicalization) can be added as a step before "eigen spec project-all"
        without requiring changes to how the hook block is identified or appended;
        specifically the hook block is delimited by recognizable begin/end markers
        so it can be replaced atomically on re-scaffold
