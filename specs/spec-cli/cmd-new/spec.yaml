id: spec-cli/cmd-new
domain: spec-cli
module: cmd-new
owner: eigen
title: spec new
status: draft
description: |
    The spec new command scaffolds a new spec module at a given path under
    the specs root. It creates the events/ directory, writes a templated
    first event file, and computes the initial spec.yaml projection.
behavior: |
    Accepts a single slash-delimited path argument (e.g. spec-cli/cmd-new).
    Creates specs/<path>/events/001_initial.yaml from a template and writes
    specs/<path>/spec.yaml. Fails with a non-zero exit code if the module
    directory already exists.
acceptance_criteria:
    - id: AC-001
      description: Creates the module directory and first event file
      given: A path that does not yet exist under specs/
      when: eigen spec new <path> is run
      then: Creates specs/<path>/events/001_initial.yaml with a template and writes spec.yaml
    - id: AC-002
      description: Fails if the module already exists
      given: A module directory that already exists
      when: eigen spec new <path> is run
      then: Exits with a non-zero code and prints an error message
dependencies: []
technology: {}
last_event: evt-001
events_count: 1
