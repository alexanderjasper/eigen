author: alexander
type: updated
summary: Update terminology from "event" to "change"
reason: |
  Update the spec new command's documentation to use "change" instead of
  "event" terminology, aligning with the broader refactoring.
changes:
  description: |
    The spec new command scaffolds a new spec module at a given path under
    the specs root. It creates the changes/ directory, writes a templated
    first change file, and computes the initial spec.yaml projection.
  behavior: |
    Accepts a single slash-delimited path argument (e.g. spec-cli/cmd-new).
    Creates specs/<path>/changes/001_initial.yaml from a template and writes
    specs/<path>/spec.yaml. Fails with a non-zero exit code if the module
    directory already exists.
  acceptance_criteria:
    - id: AC-001
      description: Creates the module directory and first change file
      given: A path that does not yet exist under specs/
      when: eigen spec new <path> is run
      then: Creates specs/<path>/changes/001_initial.yaml with a template and writes spec.yaml
