id: evt-002
sequence: 2
timestamp: 2026-03-20T20:00:00Z
author: alexander
type: updated
summary: Make non-interactive the default; add --edit flag for terminal use
reason: |
  The primary user of eigen is an AI coding agent (Claude Code) that edits
  files directly. Opening $EDITOR unconditionally blocks automated workflows.
  Non-interactive should be the default; humans who want an editor can opt in.
changes:
  description: |
    The spec event command records a new change event against an existing
    spec module. By default it writes the event template to the events/
    directory and exits, printing the path so the caller can edit it.
    Pass --edit to open $EDITOR instead (human terminal workflow).
  behavior: |
    Accepts a single slash-delimited path argument identifying the target
    module. Assigns the next sequence number automatically. The event file
    is named NNN_<slug>.yaml where the slug is derived from the event summary.

    Default (non-interactive): writes the template to events/, reprojects
    spec.yaml, and prints the file path. The caller edits the file and runs
    eigen spec project <path> to reproject after their edits.

    With --edit: writes a temp file, opens $EDITOR, and on save parses,
    writes the event, and reprojects — the original human workflow.
  acceptance_criteria:
    - id: AC-001
      description: Default run writes template and exits without opening editor
      given: A valid existing module
      when: eigen spec event <path> is run without --edit
      then: Writes NNN_initial.yaml to events/, reprojects spec.yaml, prints the file path, exits 0
    - id: AC-003
      description: --edit flag opens $EDITOR
      given: A valid existing module and EDITOR set
      when: eigen spec event <path> --edit is run
      then: Opens a pre-filled template in $EDITOR; on save appends the event file and rewrites spec.yaml
