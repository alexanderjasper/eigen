id: evt-001
sequence: 1
timestamp: 2026-03-20T21:00:00Z
author: alexander
type: created
summary: Initial spec for eigen spec event
reason: |
  Extracted from the monolithic spec-cli spec. spec event is responsible for
  recording change events against an existing module.
changes:
  title: "spec event"
  owner: eigen
  status: draft
  description: |
    The spec event command records a new change event against an existing
    spec module. It opens $EDITOR with a pre-filled template, and on save
    appends the event file and rewrites the spec.yaml projection.
  behavior: |
    Accepts a single slash-delimited path argument identifying the target
    module. Assigns the next sequence number automatically. The event file
    is named NNN_<slug>.yaml where the slug is derived from the event summary.
    After the editor closes the event is parsed, written to events/, and the
    projection is recomputed.
  acceptance_criteria:
    - id: AC-001
      description: Opens the editor and records the event on save
      given: A valid existing module and EDITOR set
      when: eigen spec event <path> is run
      then: Opens a pre-filled template in $EDITOR; on save appends the event file and rewrites spec.yaml
    - id: AC-002
      description: Assigns the next sequence number automatically
      given: A module that already has N events
      when: eigen spec event completes
      then: The new event file is named NNN_<slug>.yaml with sequence N+1
