<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eigen — Spec Navigator</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <aside id="left">
      <div id="left-header">
        <h1>Eigen</h1>
        <input id="search" type="search" placeholder="Filter modules…" autocomplete="off" />
      </div>
      <div id="tree"></div>
    </aside>
    <main id="right">
      <div id="detail-empty">Select a module to view its spec.</div>
      <div id="detail"></div>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
